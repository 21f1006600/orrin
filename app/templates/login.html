{% extends "layout.html" %}

{% block title %}Sign in — Orrin{% endblock %}

{% block content %}

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='orrin-logo.png') }}" alt="Orrin" class="auth-logo-img">
                <h1 class="auth-title">Welcome to Orrin</h1>
                <p class="auth-subtitle">Sign in to ask your company anything.</p>
            </div>

            <a href="{{ url_for('main.google_login') }}" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.1 0-11.3-3.5-13.8-8.6l-6.6 5.1C7.5 38.4 15.1 43 24 43c10.7 0 19.6-7.4 21.7-17.4.2-1 .3-2 .3-3.1 0-.8-.1-1.6-.4-2.4z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 19 13 24 13c3 0 5.7 1.1 7.8 2.9l6-6C34.1 6.6 29.3 5 24 5c-7.6 0-14.1 4.3-17.7 10.7z"/>
                    <path fill="#4CAF50" d="M24 43c5.2 0 9.9-1.7 13.5-4.6l-6.2-5.2C29.3 34.7 26.8 35.5 24 35.5c-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.8 38.6 16.3 43 24 43z"/>
                    <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.2 5.2C41 35.6 44 30.2 44 24c0-1.3-.1-2.6-.4-3.9z"/>
                </svg>
                Continue with Google
            </a>

            <p class="auth-footnote">
                You'll connect Slack and Linear in the next step.
            </p>
        </div>
    </section>

{% endblock %}
